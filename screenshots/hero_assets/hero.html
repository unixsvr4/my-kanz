<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: #ff00ff; }
  * { box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

  #hero {
    width: 1200px; height: 630px; position: relative; overflow: hidden;
    background:
      radial-gradient(680px 420px at 10% 8%, rgba(57,135,229,0.28), transparent 60%),
      #0a0a0d;
  }

  .logo { position: absolute; left: 48px; top: 42px; font-size: 40px; font-weight: 800; letter-spacing: -0.02em; color: #ffffff; }
  .logo span { color: #3987e5; }
  .tag { position: absolute; left: 50px; top: 94px; font-size: 17px; color: #a9a89e; }

  .pills { position: absolute; left: 50px; top: 130px; display: flex; gap: 8px; }
  .pill {
    font-size: 12.5px; color: #d7d6cd; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 5px 12px;
    white-space: nowrap;
  }

  .card {
    position: absolute; border-radius: 12px; overflow: hidden;
    background: #1a1a19; box-shadow: 0 30px 70px rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .chrome {
    height: 26px; background: #232322; display: flex; align-items: center; gap: 6px; padding: 0 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot.r { background: #ec6a5e; } .dot.y { background: #f4bf4f; } .dot.g { background: #61c454; }
  .chrome .url {
    margin: 0 auto; font-size: 10.5px; color: #8b8a83; background: #171716;
    border-radius: 999px; padding: 2px 14px;
  }
  .card img { display: block; width: 100%; height: auto; }

  #enCard { left: 48px; top: 178px; width: 720px; }
  #arCard { left: 676px; top: 322px; width: 476px; transform: rotate(1.6deg); z-index: 2; }
  #enCard { z-index: 1; }

  .arBadge {
    position: absolute; left: 682px; top: 300px; z-index: 3; transform: rotate(1.6deg);
    background: #3987e5; color: #fff; font-size: 12.5px; font-weight: 700;
    padding: 5px 12px; border-radius: 999px; box-shadow: 0 8px 20px rgba(57,135,229,0.45);
  }

  .caption {
    position: absolute; right: 50px; bottom: 26px; font-size: 12.5px; color: #7d7c74;
  }
</style>
</head>
<body>
  <div id="hero">
    <div class="logo">Kanz<span>Match</span></div>
    <div class="tag">AI resume ↔ job-description fit analyzer — scores locally, coaches with Claude</div>
    <div class="pills">
      <div class="pill">🔒 100% private — nothing ever leaves the browser</div>
      <div class="pill">🌐 English + Arabic, real RTL</div>
      <div class="pill">$0 to run, at any scale</div>
    </div>

    <div class="card" id="enCard">
      <div class="chrome"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="url">kanzmatch</div></div>
      <img src="en_crop.png">
    </div>

    <div class="arBadge">🌐 عربي · RTL</div>
    <div class="card" id="arCard">
      <div class="chrome"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="url">kanzmatch</div></div>
      <img src="ar_crop.png">
    </div>

    <div class="caption">Kanz AI Training Hackathon 2026</div>
  </div>
</body>
</html>
